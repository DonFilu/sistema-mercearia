<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clan Cidio - Home</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: #f3f6fb;
      color: #101828;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(780px, 100%);
      background: #fff;
      border: 1px solid #d8e0ea;
      border-radius: 14px;
      padding: 34px;
      box-shadow: 0 18px 48px rgba(16,24,40,.10);
      text-align: center;
    }
    h1 { margin: 0 0 10px; font-size: 38px; letter-spacing: 0; }
    p { margin: 0 0 24px; color: #667085; font-size: 18px; line-height: 1.55; }
    .actions { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
    a, button {
      border: 0;
      border-radius: 10px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }
    .primary { background: #5865f2; color: #fff; }
    .secondary { background: #e9eef7; color: #101828; }
  </style>
</head>
<body>
  <main>
    <h1>Primeiros 30 dias grátis!</h1>
    <p>A facilidade desse sistema vai surpreender você!</p>
    <div class="actions">
      <a id="invite" class="primary" target="_blank" rel="noopener">Convidar bot</a>
      <a class="secondary" href="/clans/painel">Painel de controle</a>
    </div>
  </main>
  <script>
    async function loadInvite() {
      try {
        const response = await fetch("/api/clans/me");
        if (!response.ok) {
          window.location.href = "/clans";
          return;
        }
      } catch (err) {
        window.location.href = "/clans";
        return;
      }

      document.getElementById("invite").href = "/api/clans/bot-invite";
    }

    loadInvite();
  </script>
</body>
</html>
