<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Produtos - Sistema de Caixa</title>
    <style>
        :root { 
            --cor-principal: #1a73e8; 
            --bg-body: #f0f2f5; 
            --text-color: #333;
            --bg-card: white;
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); color: var(--text-color); margin: 0; transition: 0.3s; }
        
        /* Navbar unificada e corrigida */
        .navbar { background: var(--cor-principal); padding: 10px; display: flex; justify-content: center; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex-wrap: wrap; }
        .navbar a { color: white; text-decoration: none; font-weight: bold; padding: 10px 15px; border-radius: 5px; font-size: 13px; }
        .navbar a:hover { background: rgba(255,255,255,0.2); }

        .container { max-width: 900px; margin: 20px auto; background: var(--bg-card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        h2 { color: var(--cor-principal); border-bottom: 2px solid var(--cor-principal); padding-bottom: 10px; }

        .form-cadastro { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.03); padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .form-cadastro div { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: bold; margin-bottom: 5px; opacity: 0.8; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; background: white; color: black; }
        
        .btn-adicionar { background: #28a745; color: white; border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; grid-column: 1 / -1; font-size: 16px; }
        .btn-adicionar:hover { background: #218838; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: rgba(0,0,0,0.05); text-align: left; padding: 12px; border-bottom: 2px solid #ddd; color: var(--text-color); }
        td { padding: 12px; border-bottom: 1px solid #eee; }

        /* Cores de Alerta */
        .estoque-baixo { background-color: rgba(211, 47, 47, 0.1) !important; color: #d32f2f; }
        .badge-alerta { background: #d32f2f; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-left: 5px; font-weight: bold; }

        .btn-acao { border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-editar { background: #ffc107; color: #000; margin-right: 5px; }
        .btn-excluir { background: #dc3545; color: white; }

        /* Modo Escuro */
        body.dark-mode { --bg-body: #121212; --text-color: #f1f1f1; --bg-card: #1e1e1e; }
        body.dark-mode input, body.dark-mode select { background: #333; color: white; border-color: #444; }
        body.dark-mode td { border-bottom-color: #333; }
        body.dark-mode th { background: #252525; }
    </style>
</head>
<body>

    <div class="navbar" id="navPrincipal">
        <a href="index.html">🛒 CAIXA</a>
        <a href="cadastro.html" style="background: rgba(0,0,0,0.3);">📝 PRODUTOS</a>
        <a href="clientes.html">👤 CLIENTES</a>
        <a href="ficha_clientes.html">📒 FICHA</a>
        <a href="relatorio.html">📊 RELATÓRIOS</a>
        <a href="configuracoes.html">⚙️ CONFIG</a>
        <a href="avisos.html" style="background: rgba(0,0,0,0.3);">🔔 AVISOS</a>
    </div>

    <div class="container">
        <h2>Gerenciamento de Produtos</h2>

        <div class="form-cadastro">
            <div><label>Código de Barras</label><input type="text" id="p_codigo" placeholder="Escaneie ou digite"></div>
            <div><label>Nome do Produto</label><input type="text" id="p_nome" placeholder="Ex: Arroz 5kg"></div>
            <div><label>Preço de Venda (R$)</label><input type="number" id="p_preco" step="0.01" placeholder="0.00"></div>
            <div><label>Tipo</label><select id="p_tipo"><option value="un">UNIDADE (UN)</option><option value="kg">QUILO (KG)</option></select></div>
            <div><label>Estoque Inicial</label><input type="number" id="p_estoque" step="0.001" placeholder="0"></div>
            <button class="btn-adicionar" onclick="salvarProduto()">SALVAR / ATUALIZAR PRODUTO</button>
        </div>

        <div style="margin-top: 20px;">
            <label>Pesquisar no Inventário:</label>
            <input type="text" id="filtroProd" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:2px solid var(--cor-principal); box-sizing: border-box;" placeholder="🔍 Digite o nome ou código do produto..." oninput="listarProdutos()">
        </div>

        <table>
            <thead>
                <tr>
                    <th>Cód</th>
                    <th>Produto</th>
                    <th>Preço</th>
                    <th>Estoque</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaProdutos"></tbody>
        </table>
    </div>

    <script>
        window.onload = function() {
            if (localStorage.getItem('logado') !== 'true') { window.location.href = "login.html"; return; }
            aplicarPreferencias();
            listarProdutos();
        };

        function aplicarPreferencias() {
            const tema = localStorage.getItem('tema') || 'light';
            const cor = localStorage.getItem('corPrincipal') || '#1a73e8';
            if (tema === 'dark') document.body.classList.add('dark-mode');
            document.getElementById('navPrincipal').style.backgroundColor = cor;
            document.documentElement.style.setProperty('--cor-principal', cor);
        }

        function salvarProduto() {
            const cod = document.getElementById('p_codigo').value.trim();
            const nome = document.getElementById('p_nome').value.trim();
            const preco = parseFloat(document.getElementById('p_preco').value);
            const tipo = document.getElementById('p_tipo').value;
            const estoque = parseFloat(document.getElementById('p_estoque').value) || 0;

            if(!cod || !nome || isNaN(preco)) {
                alert("Erro: Preencha Código, Nome e Preço corretamente.");
                return;
            }

            let produtos = JSON.parse(localStorage.getItem('meusProdutos')) || {};
            
            // Salva os dados
            produtos[cod] = { nome, preco, tipo, estoque };
            localStorage.setItem('meusProdutos', JSON.stringify(produtos));
            
            // Limpa os campos
            document.getElementById('p_codigo').value = "";
            document.getElementById('p_nome').value = "";
            document.getElementById('p_preco').value = "";
            document.getElementById('p_estoque').value = "";
            
            listarProdutos();
            document.getElementById('p_codigo').focus();
        }

        function listarProdutos() {
            const produtos = JSON.parse(localStorage.getItem('meusProdutos')) || {};
            const tabela = document.getElementById('tabelaProdutos');
            const filtro = document.getElementById('filtroProd').value.toLowerCase();
            const estoqueAtivado = localStorage.getItem('estoqueAtivado') === 'true';
            
            tabela.innerHTML = "";

            // Converter objeto em array para poder ordenar (opcional, mas ajuda)
            for (let cod in produtos) {
                let p = produtos[cod];
                if (p.nome.toLowerCase().includes(filtro) || cod.includes(filtro)) {
                    
                    // Lógica de destaque: estoque baixo (menor ou igual a 5)
                    const qtd = parseFloat(p.estoque) || 0;
                    const isBaixo = estoqueAtivado && qtd <= 5;
                    const classeLinha = isBaixo ? 'estoque-baixo' : '';
                    const badgeAlerta = isBaixo ? `<span class="badge-alerta">BAIXO</span>` : '';

                    let tr = document.createElement('tr');
                    tr.className = classeLinha;
                    tr.innerHTML = `
                        <td><small>${cod}</small></td>
                        <td><strong>${p.nome}</strong></td>
                        <td>R$ ${parseFloat(p.preco).toFixed(2)}</td>
                        <td>${qtd.toFixed(2)} ${p.tipo.toUpperCase()} ${badgeAlerta}</td>
                        <td>
                            <button class="btn-acao btn-editar" onclick="editar('${cod}')" title="Editar">✎</button>
                            <button class="btn-acao btn-excluir" onclick="excluir('${cod}')" title="Excluir">✖</button>
                        </td>
                    `;
                    tabela.appendChild(tr);
                }
            }
            
            if (Object.keys(produtos).length === 0) {
                tabela.innerHTML = "<tr><td colspan='5' style='text-align:center'>Nenhum produto cadastrado.</td></tr>";
            }
        }

        function editar(cod) {
            const produtos = JSON.parse(localStorage.getItem('meusProdutos'));
            const p = produtos[cod];
            document.getElementById('p_codigo').value = cod;
            document.getElementById('p_nome').value = p.nome;
            document.getElementById('p_preco').value = p.preco;
            document.getElementById('p_tipo').value = p.tipo;
            document.getElementById('p_estoque').value = p.estoque;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function excluir(cod) {
            if(confirm("Tem certeza que deseja excluir este produto? Esta ação não pode ser desfeita.")) {
                let produtos = JSON.parse(localStorage.getItem('meusProdutos'));
                delete produtos[cod];
                localStorage.setItem('meusProdutos', JSON.stringify(produtos));
                listarProdutos();
            }
        }
    </script>
</body>
</html>
