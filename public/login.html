<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Acesso ao Sistema</title>
    <style>
        :root {
            --cor-principal: #1a73e8;
            --bg-body: var(--cor-principal);
            --bg-card: white;
            --text-color: #333;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg-body); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            transition: 0.3s;
        }

        .box { 
            background: var(--bg-card); 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            text-align: center; 
            width: 320px;
        }

        .titulo-sistema {
            color: var(--cor-principal);
            font-size: 24px;
            font-weight: bold;
            margin: 0;
            display: block;
        }

        .subtitulo-sistema {
            color: #666;
            font-size: 13px;
            margin-bottom: 25px;
            display: block;
        }

        h2 { 
            color: var(--text-color); 
            margin-bottom: 20px; 
            border-top: 1px solid #eee; 
            padding-top: 15px; 
            font-size: 18px;
        }

        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 2px solid #eee; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px;
            outline: none;
        }

        input:focus { border-color: var(--cor-principal); }

        button { 
            width: 100%; 
            padding: 12px; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
            margin-top: 10px;
            transition: 0.2s;
        }

        .btn-login {
            background: #28a745;
        }

        .btn-google {
            background: #db4437;
        }

        button:hover { transform: translateY(-1px); }

        body.dark-mode {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --text-color: #ffffff;
        }

        body.dark-mode input {
            background: #333;
            border-color: #444;
            color: white;
        }

        body.dark-mode .subtitulo-sistema { color: #aaa; }
        body.dark-mode h2 { border-color: #333; }
    </style>
</head>
<body>

<div class="box">
    <span class="titulo-sistema">Sistema de Mercearias</span>
    <span class="subtitulo-sistema">Desenvolvido por Grupo Don</span>

    <h2>🔒 Acesso</h2>
    
    <input type="text" id="user" placeholder="Usuário" autofocus>
    <input type="password" id="pass" placeholder="Senha">
    
    <button class="btn-login" onclick="entrar()">ENTRAR NO SISTEMA</button>

    <hr style="margin:20px 0">

    <button class="btn-google" onclick="loginGoogle()">Entrar com Google</button>
</div>

<script>
window.onload = function() {
    const tema = localStorage.getItem('tema');
    const cor = localStorage.getItem('corPrincipal') || '#1a73e8';
    
    if (tema === 'dark') {
        document.body.classList.add('dark-mode');
    } else {
        document.body.style.backgroundColor = cor;
    }

    document.documentElement.style.setProperty('--cor-principal', cor);
};

// LOGIN ANTIGO (SUA MÃE)
function entrar() {
    const u = document.getElementById('user').value;
    const p = document.getElementById('pass').value;
    let autorizado = false;

    if (u === "mwvariedades" && p === "960080") autorizado = true;
    else if (u === "adminim1" && p === "5050") autorizado = true;
    else if (u === "adminim2" && p === "5051") autorizado = true;
    else if (u === "adminim3" && p === "5052") autorizado = true;
    else if (u === "adminim4" && p === "5052") autorizado = true;

    if (autorizado) {
        localStorage.removeItem("token"); // garante que usa default
        localStorage.setItem('logado', 'true');
        localStorage.setItem('usuarioAtivo', u);
        window.location.href = "index.html";
    } else {
        alert("Usuário ou senha incorretos!");
    }
}

// LOGIN GOOGLE (NOVOS USUÁRIOS)
async function loginGoogle() {
    const name = prompt("Seu nome:");
    const email = prompt("Seu email:");

    if (!name || !email) return alert("Preencha corretamente!");

    const res = await fetch("/auth/google", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ name, email })
    });

    const data = await res.json();

    localStorage.setItem("token", data.token);
    localStorage.setItem("logado", "true");

    window.location.href = "index.html";
}

document.addEventListener('keypress', function (e) {
    if (e.key === 'Enter') entrar();
});
</script>

</body>
</html>
