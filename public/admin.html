<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Admin</title>

<style>
body {
  font-family: Arial;
  background:#f0f2f5;
  margin:0;
}

.container {
  max-width:1200px;
  margin:20px auto;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h2 {
  margin-bottom: 20px;
}

table {
  width:100%;
  border-collapse: collapse;
  margin-bottom: 30px;
}

th {
  background:#1a73e8;
  color:white;
}

th, td {
  padding:10px;
  text-align:center;
  border-bottom:1px solid #ddd;
  font-size: 13px;
}

.ativo {
  color: green;
  font-weight:bold;
}

.vencido {
  color: red;
  font-weight:bold;
}

button {
  background:#1a73e8;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:5px;
  cursor:pointer;
}

button:hover {
  opacity: 0.9;
}

.topo {
  display:flex;
  justify-content: space-between;
  margin-bottom:15px;
}

input {
  padding:8px;
  border-radius:5px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="container">

<!-- 🔵 USUÁRIOS -->
<div class="topo">
  <h2>👑 Painel Admin</h2>
  <input id="busca" placeholder="Buscar email..." oninput="filtrar()">
</div>

<table>
<thead>
<tr>
<th>Email</th>
<th>Status</th>
<th>Expira</th>
<th>IP</th>
<th>Cidade</th>
<th>País</th>
<th>Provedor</th>
<th>Último acesso</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="lista"></tbody>
</table>


<!-- 🟡 AFILIADOS -->
<h2>💰 Afiliados</h2>

<table>
<thead>
<tr>
<th>Email</th>
<th>Telefone</th>
<th>Status</th>
<th>Saldo</th>
<th>Clientes Ativos</th>
<th>Total Pago</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="afiliados"></tbody>

</table>
<h2>💸 Saques</h2>

<table>
<thead>
<tr>
<th>Email</th>
<th>Valor</th>
<th>PIX</th>
<th>Status</th>
<th>Data</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="saques"></tbody>
</table>

</div>

<script>
let usuarios = [];

// ================= USUÁRIOS =================

async function carregar() {
  const res = await fetch("/admin/users", {
    headers: {
      "x-user-id": localStorage.getItem("userId")
    }
  });

  usuarios = await res.json();
  render(usuarios);
}

function render(listaUsers) {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  const hoje = new Date();

  listaUsers.forEach(u => {
    const data = new Date(u.dataExpiracao);
    const ativo = u.dataExpiracao && data > hoje;

    lista.innerHTML += `
      <tr>
        <td>${u.email}</td>

        <td class="${ativo ? 'ativo' : 'vencido'}">
          ${ativo ? 'ATIVO' : 'VENCIDO'}
        </td>

        <td>${u.dataExpiracao ? data.toLocaleDateString() : "-"}</td>

        <td>${u.ultimoIP || "-"}</td>
        <td>${u.cidade || "-"}</td>
        <td>${u.pais || "-"}</td>
        <td>${u.provedor || "-"}</td>

        <td>
          ${u.ultimoAcesso 
            ? new Date(u.ultimoAcesso).toLocaleString() 
            : "-"
          }
        </td>

        <td>
          <button onclick="liberar('${u._id}')">
            Liberar
          </button>
        </td>
      </tr>
    `;
  });
}

function filtrar() {
  const termo = document.getElementById("busca").value.toLowerCase();

  const filtrados = usuarios.filter(u =>
    u.email.toLowerCase().includes(termo)
  );

  render(filtrados);
}

async function liberar(id) {
  await fetch("/admin/liberar", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-user-id": localStorage.getItem("userId")
    },
    body: JSON.stringify({ id })
  });

  carregar();
}

// ================= AFILIADOS =================

async function carregarAfiliados() {
  const res = await fetch("/admin/afiliados", {
    headers: {
      "x-user-id": localStorage.getItem("userId")
    }
  });

  const lista = await res.json();

  const tabela = document.getElementById("afiliados");
  tabela.innerHTML = "";

  lista.forEach(a => {
    tabela.innerHTML += `
      <tr>
        <td>${a.email}</td>
        <td>${a.telefone || "-"}</td>
        <td>${a.status}</td>
       <td>R$ ${a.saldo || 0}</td>
<td>${a.clientesAtivos || 0}</td>
<td>R$ ${a.totalPago || 0}</td>

        <td>
          ${
            a.status === "pendente"
              ? `
            <button onclick="aprovar('${a._id}')">Aprovar</button>
            <button onclick="recusar('${a._id}')">Recusar</button>
          `
              : "-"
          }
        </td>
      </tr>
    `;
  });
}

async function aprovar(id) {
  await fetch("/admin/aprovar-afiliado", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-user-id": localStorage.getItem("userId")
    },
    body: JSON.stringify({ id })
  });

  carregarAfiliados();
}

async function recusar(id) {
  await fetch("/admin/recusar-afiliado", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-user-id": localStorage.getItem("userId")
    },
    body: JSON.stringify({ id })
  });

  carregarAfiliados();
}

async function carregarSaques() {
  const res = await fetch("/admin/saques", {
    headers: {
      "x-user-id": localStorage.getItem("userId")
    }
  });

  const lista = await res.json();

  const tabela = document.getElementById("saques");
  tabela.innerHTML = "";

  lista.forEach(s => {
    tabela.innerHTML += `
      <tr>
        <td>${s.email}</td>
        <td>R$ ${s.valor}</td>
        <td>
  ${s.pix || "-"}
  ${
    s.pix
      ? `<button onclick="navigator.clipboard.writeText('${s.pix}')">📋</button>`
      : ""
  }
</td>
        <td>${s.status}</td>
<td>${s.data ? new Date(s.data).toLocaleDateString() : "-"}</td>
<td>
          ${
            s.status === "pendente"
              ? `<button onclick="confirmarSaque('${s._id}')">Confirmar</button>`
              : "-"
          }
        </td>
      </tr>
    `;
  });
}

async function confirmarSaque(id) {
  await fetch("/admin/confirmar-saque", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-user-id": localStorage.getItem("userId")
    },
    body: JSON.stringify({ id })
  });

  alert("Pagamento confirmado!");
 carregar();
carregarAfiliados();
carregarSaques();
}
carregar();
carregarAfiliados();
carregarSaques();
</script>

</body>
</html>
