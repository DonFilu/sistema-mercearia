<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cidio</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6f8;
      color: #17202a;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(860px, 100%);
    }
    .brand {
      margin-bottom: 22px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 38px;
      letter-spacing: 0;
    }
    p {
      margin: 0;
      color: #5d6d7e;
      line-height: 1.5;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      margin-top: 26px;
    }
    a {
      display: block;
      background: #fff;
      border: 1px solid #dde3ea;
      border-radius: 8px;
      padding: 24px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 10px 24px rgba(16, 24, 40, 0.08);
      min-height: 170px;
    }
    a:hover { border-color: #1a73e8; }
    strong {
      display: block;
      font-size: 24px;
      margin-bottom: 10px;
    }
    span {
      color: #5d6d7e;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main>
    <div class="brand">
      <h1>Cidio</h1>
      <p>Escolha o sistema que deseja acessar.</p>
    </div>
    <div class="grid">
      <a href="/mercearias">
        <strong>Cidio Mercearias</strong>
        <span>PDV, produtos, clientes, fiado e relatórios para mercearias.</span>
      </a>
      <a href="/restaurantes">
        <strong>Cidio Restaurantes</strong>
        <span>PDV, cardápio online, pedidos, entregas por bairro e gestão de estoque.</span>
      </a>
    </div>
  </main>
</body>
</html>
