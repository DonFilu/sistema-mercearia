<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clan Cidio</title>
  <link rel="stylesheet" href="/clans/clan-cidio-loader.css">
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #f3f6fb;
      --panel: #fff;
      --text: #101828;
      --muted: #667085;
      --line: #d8e0ea;
      --brand: #5865f2;
      --brand-dark: #4752c4;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, rgba(88,101,242,.14), transparent 34%), var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(880px, 100%);
      display: grid;
      grid-template-columns: 1fr 390px;
      gap: 28px;
      align-items: center;
    }
    h1 { margin: 0 0 12px; font-size: 44px; letter-spacing: 0; }
    p { margin: 0; color: var(--muted); font-size: 17px; line-height: 1.55; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 26px;
      box-shadow: 0 18px 48px rgba(16,24,40,.12);
    }
    .card h2 { margin: 0 0 8px; font-size: 24px; }
    .discord {
      display: block;
      width: 100%;
      border: 0;
      border-radius: 10px;
      background: var(--brand);
      color: #fff;
      text-align: center;
      padding: 13px 16px;
      text-decoration: none;
      font-weight: 800;
      margin-top: 20px;
    }
    .discord:hover { background: var(--brand-dark); }
    .note {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
    }
    @media (max-width: 820px) {
      main { grid-template-columns: 1fr; }
      h1 { font-size: 34px; }
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>Bem-vindo ao Clan Cidio</h1>
      <p>Organize seu servidor com uma experiência simples, moderna e preparada para integrações futuras.</p>
    </section>
    <section class="card">
      <h2>Entre com Discord para começar</h2>
      <p>Use sua conta Discord para acessar seu painel e listar seus servidores.</p>
      <a class="discord" href="/api/auth/discord" onclick="if (window.ClanCidioLoader) window.ClanCidioLoader.pulse(1200)">Entrar com Discord</a>
      <div class="note">O Clan Cidio é separado do sistema de mercearias.</div>
    </section>
  </main>
  <script src="/clans/clan-cidio-loader.js"></script>
</body>
</html>
