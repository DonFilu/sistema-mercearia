<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Acesso ao Sistema</title>

    <style>
        :root {
            --cor-principal: #1a73e8;
            --bg-body: var(--cor-principal);
            --bg-card: white;
            --text-color: #333;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg-body); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        .box { 
            background: var(--bg-card); 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            text-align: center; 
            width: 320px;
        }

        input, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
        }

        input {
            border: 2px solid #eee;
        }

        button {
            background: #28a745;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }
    </style>
</head>

<body>

<div class="box">

    <!-- INICIAL -->
    <div id="inicio">
        <h2>Bem-vindo</h2>
        <button onclick="mostrarLogin()">LOGIN</button>
        <button onclick="mostrarCadastro()">CRIAR CONTA</button>
    </div>

    <!-- LOGIN -->
    <div id="login" style="display:none;">
        <h2>Login</h2>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginSenha" placeholder="Senha">

        <button onclick="entrar()">ENTRAR</button>

        <p>
            <a href="https://wa.me/554899962908?text=Oi,%20esqueci%20minha%20senha" target="_blank">
                Esqueceu sua senha?
            </a>
        </p>

        <button onclick="voltar()">Voltar</button>
    </div>

    <!-- CADASTRO -->
    <div id="cadastro" style="display:none;">
        <h2>Criar Conta</h2>
        <input type="email" id="cadEmail" placeholder="Email">
        <input type="password" id="cadSenha" placeholder="Senha">
        <input type="password" id="cadConfirmar" placeholder="Confirmar Senha">

        <button onclick="criarConta()">CRIAR CONTA</button>
        <button onclick="voltar()">Voltar</button>
    </div>

</div>

<script>

// TEMA
window.onload = function() {
    const tema = localStorage.getItem('tema');
    const cor = localStorage.getItem('corPrincipal') || '#1a73e8';
    
    if (tema === 'dark') {
        document.body.classList.add('dark-mode');
    } else {
        document.body.style.backgroundColor = cor;
    }
};

// TELAS
function mostrarLogin() {
    inicio.style.display = "none";
    login.style.display = "block";
}

function mostrarCadastro() {
    inicio.style.display = "none";
    cadastro.style.display = "block";
}

function voltar() {
    inicio.style.display = "block";
    login.style.display = "none";
    cadastro.style.display = "none";
}

// LOGIN
async function entrar() {
    const email = document.getElementById("loginEmail").value;
    const senha = document.getElementById("loginSenha").value;

    const res = await fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email, senha })
    });

    if (!res.ok) {
        alert("Email ou senha incorretos");
        return;
    }

    const data = await res.json();

    localStorage.setItem("userId", data.userId);
    localStorage.setItem("logado", "true");

    window.location.href = "index.html";
}

// CADASTRO
async function criarConta() {
    const email = cadEmail.value;
    const senha = cadSenha.value;
    const confirmar = cadConfirmar.value;

    if (!email || !senha || !confirmar) {
        alert("Preencha tudo");
        return;
    }

    if (senha !== confirmar) {
        alert("Senhas não coincidem");
        return;
    }

    const res = await fetch("/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email, senha })
    });

    const data = await res.json();

    if (!res.ok) {
        alert(data.erro);
        return;
    }

    alert("Conta criada com sucesso!");
    voltar();
}

</script>

</body>
</html>
