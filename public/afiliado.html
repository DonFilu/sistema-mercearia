<!DOCTYPE html>
<html>
<head>
  <title>Painel Afiliado</title>

  <style>
    body {
      font-family: Arial;
      background:#f0f2f5;
      margin:0;
      padding:20px;
    }

    .container {
      max-width:800px;
      margin:auto;
      background:white;
      padding:20px;
      border-radius:12px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom:15px;
    }

    .box {
      background:#f7f7f7;
      padding:15px;
      border-radius:8px;
      margin-bottom:15px;
    }

    button {
      background:#1a73e8;
      color:white;
      border:none;
      padding:10px;
      border-radius:6px;
      cursor:pointer;
      margin-top:10px;
    }

    button:hover {
      opacity:0.9;
    }

    .link {
      word-break: break-all;
      font-size:13px;
    }

    input {
      width:100%;
      padding:8px;
      border-radius:6px;
      border:1px solid #ccc;
      margin-top:5px;
    }
    .status-pendente {
  color: orange;
  font-weight: bold;
}

.status-pago {
  color: green;
  font-weight: bold;
}
  </style>
</head>

<body>

<div class="container">

<h2>💰 Painel do Afiliado</h2>

<div class="box">
  <strong id="saldo"></strong><br>
  <small>Saque mínimo: R$10</small>
  <p id="clientes"></p>
  <p id="totalSacado"></p>
  <p id="valorPendente"></p>
  <p id="pendente" style="color: orange; font-weight: bold;"></p>
</div>

<div class="box">
  <strong>🔗 Seu link:</strong>
  <p id="link" class="link"></p>
  <button onclick="copiar()">Copiar link</button>
</div>

<div class="box">
  <strong>🔑 Chave PIX:</strong>
  <input id="pix" placeholder="Digite sua chave PIX">
  <button onclick="salvarPix()">Salvar</button>
</div>

<div class="box">
  <strong>📊 Ganhos:</strong>
  <div id="historico"></div>
</div>

<div class="box">
  <strong>💸 Saques:</strong>
  <div id="saques"></div>
</div>

<button id="btnSacar" onclick="sacar()">Sacar tudo</button>

<p id="status"></p>

</div>

<script>

// 🔒 proteção
if (!localStorage.getItem("afiliadoId")) {
  window.location.href = "/afiliado-login.html";
}

let afiliado = {};

// 🔄 carregar dados
async function carregar() {
  const res = await fetch("/afiliado/dados", {
    headers: {
      "x-afiliado-id": localStorage.getItem("afiliadoId")
    }
  });

  afiliado = await res.json();

  document.getElementById("saldo").innerText =
    "Saldo: R$ " + (afiliado.saldo || 0);

  document.getElementById("pix").value = afiliado.pix || "";

  const link = window.location.origin + "/?ref=" + afiliado.codigo;
  document.getElementById("link").innerText = link;
}

// 📊 ganhos
async function carregarHistorico() {
  const res = await fetch("/afiliado/comissoes", {
    headers: {
      "x-afiliado-id": localStorage.getItem("afiliadoId")
    }
  });

  const lista = await res.json();

  const div = document.getElementById("historico");
  div.innerHTML = "";

  if (!lista.length) {
    div.innerHTML = "<p>Sem ganhos ainda</p>";
    return;
  }

  lista.forEach(c => {
    div.innerHTML += `
      <p>💰 +R$${c.valor} - ${c.descricao}</p>
    `;
  });
}

// 💸 saques
async function carregarSaques() {
  const res = await fetch("/afiliado/saques", {
    headers: {
      "x-afiliado-id": localStorage.getItem("afiliadoId")
    }
  });

  const data = await res.json();

  document.getElementById("totalSacado").innerText =
    "💸 Total sacado: R$ " + data.totalSacado;

  const div = document.getElementById("saques");
  div.innerHTML = "";

  const temPendente = data.saques.some(s => s.status === "pendente");

  document.getElementById("pendente").innerText =
    temPendente ? "⏳ Você tem um saque em análise" : "";

  // 🔥 BOTÃO (FORA DO LOOP)
  const botao = document.getElementById("btnSacar");

  if (temPendente) {
    botao.disabled = true;
    botao.innerText = "Saque em análise";
  } else {
    botao.disabled = false;
    botao.innerText = "Sacar tudo";
  }
const valorPendente = data.saques
  .filter(s => s.status === "pendente")
  .reduce((acc, s) => acc + s.valor, 0);

document.getElementById("valorPendente").innerText =
  valorPendente > 0
    ? "⏳ Em análise: R$ " + valorPendente
    : "";
  // 🔥 LISTA DE SAQUES
  data.saques.forEach(s => {
    div.innerHTML += `
      <p>
        R$ ${s.valor} - 
        <span class="${s.status === 'pago' ? 'status-pago' : 'status-pendente'}">
          ${s.status}
        </span> - 
        ${s.data ? new Date(s.data).toLocaleDateString() : "-"}
      </p>
    `;
  });
}

// 👥 clientes ativos
async function carregarStats() {
  const res = await fetch("/afiliado/stats", {
    headers: {
      "x-afiliado-id": localStorage.getItem("afiliadoId")
    }
  });

  const data = await res.json();

  document.getElementById("clientes").innerText =
    "👥 Clientes ativos: " + data.clientesAtivos;
}

// 🔑 salvar pix
async function salvarPix() {
  const pix = document.getElementById("pix").value;

  await fetch("/afiliado/pix", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-afiliado-id": localStorage.getItem("afiliadoId")
    },
    body: JSON.stringify({ pix })
  });

  alert("PIX salvo!");
}

// 📋 copiar
function copiar() {
  const texto = document.getElementById("link").innerText;
  navigator.clipboard.writeText(texto);
  alert("Link copiado!");
}

// 💸 sacar
async function sacar() {
  if ((afiliado.saldo || 0) < 10) {
    alert("Saque mínimo é R$10");
    return;
  }

  const botao = event.target;
  botao.disabled = true;
  botao.innerText = "Enviando...";

  const res = await fetch("/afiliado/sacar", {
    method: "POST",
    headers: {
      "x-afiliado-id": localStorage.getItem("afiliadoId")
    }
  });

  const data = await res.json();

  if (data.erro) {
    alert(data.erro);
    botao.disabled = false;
    botao.innerText = "Sacar tudo";
    return;
  }

  document.getElementById("status").innerText =
    "✅ Pedido enviado! Aguarde pagamento."

  carregar();
  carregarSaques();
}

// 🚀 init
carregar();
carregarHistorico();
carregarSaques();
carregarStats();

</script>

</body>
</html>
