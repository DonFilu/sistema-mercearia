<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ficha de Fiados - Sistema de Caixa</title>
    <style>
        :root { 
            --cor-principal: #1a73e8; 
            --bg-body: #f4f4f4; 
            --text-color: #333; 
            --bg-card: white;
            --border-color: #ddd;
        }

        body.dark-mode { 
            --bg-body: #121212; 
            --text-color: #f1f1f1; 
            --bg-card: #1e1e1e;
            --border-color: #333;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); color: var(--text-color); margin: 0; padding: 0; transition: 0.3s; }
        
        .navbar { background: var(--cor-principal); padding: 10px; display: flex; justify-content: center; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); flex-wrap: wrap; }
        .navbar a { color: white; text-decoration: none; font-weight: bold; padding: 10px 15px; border-radius: 5px; font-size: 13px; }
        .navbar a:hover { background: rgba(255,255,255,0.2); }

        .container { max-width: 900px; margin: 30px auto; background: var(--bg-card); padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); border: 1px solid var(--border-color); }
        
        .busca-box { margin-bottom: 25px; }
        .busca-box input { width: 100%; padding: 15px; border: 2px solid var(--cor-principal); border-radius: 10px; font-size: 18px; outline: none; box-sizing: border-box; background: var(--bg-card); color: var(--text-color); }

        .cliente-card { border: 1px solid var(--border-color); border-radius: 10px; margin-bottom: 25px; overflow: hidden; background: var(--bg-card); border-left: 5px solid var(--cor-principal); }
        .cliente-header { background: rgba(122,122,122,0.05); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .cliente-nome { font-size: 20px; font-weight: bold; color: var(--cor-principal); }
        .total-divida { font-size: 22px; color: #d93025; font-weight: bold; }
        
        .painel-pagamento { background: rgba(26, 115, 232, 0.08); padding: 15px; display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; border-bottom: 1px solid var(--border-color); }
        .campo-input { display: flex; flex-direction: column; gap: 5px; }
        .campo-input label { font-size: 11px; font-weight: bold; opacity: 0.7; text-transform: uppercase; }
        .campo-input input { padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; width: 140px; font-size: 16px; background: var(--bg-card); color: var(--text-color); }
        
        .btn-confirmar { background: #28a745; color: white; border: none; padding: 10px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; height: 42px; transition: 0.2s; }
        .btn-confirmar:hover { background: #218838; transform: scale(1.05); }

        .resultado-troco { background: #fff9c4; color: #856404; padding: 10px 15px; border-radius: 6px; font-weight: bold; border: 1px solid #ffeeba; display: none; }
        body.dark-mode .resultado-troco { background: #332b00; color: #ffd600; border-color: #444; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(122,122,122,0.1); padding: 10px; text-align: left; font-size: 12px; opacity: 0.8; }
        td { padding: 10px; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        .pagamento-registro { color: #28a745; font-weight: bold; }

        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal { background: var(--bg-card); padding: 30px; border-radius: 12px; width: 350px; text-align: center; border: 1px solid var(--border-color); }
        .btn-modal { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 20px; background: var(--cor-principal); color: white; width: 100%; }
    </style>
</head>
<body>

    <div id="modalOverlay">
        <div class="modal">
            <h3 id="modalTitle">Sucesso</h3>
            <p id="modalText"></p>
            <button class="btn-modal" onclick="fecharModal()">OK, ENTENDIDO</button>
        </div>
    </div>

    <div class="navbar" id="navPrincipal">
        <a href="index.html">🛒 CAIXA</a>
        <a href="cadastro.html">📝 PRODUTOS</a>
        <a href="clientes.html">👤 CLIENTES</a>
        <a href="ficha_clientes.html" style="background: rgba(0,0,0,0.3);">📒 FICHA</a>
        <a href="relatorio.html">📊 RELATÓRIOS</a>
        <a href="configuracoes.html">⚙️ CONFIG</a>
        <a href="avisos.html" style="background: rgba(0,0,0,0.3);">🔔 AVISOS</a>
    </div>

    <div class="container">
        <h2>📒 Caderneta Digital (Dívidas Ativas)</h2>
        
        <div class="busca-box">
            <input type="text" id="campoBusca" placeholder="🔍 Digite o nome do cliente para buscar na ficha..." oninput="filtrarPorNome()">
        </div>

        <div id="listaFiados"></div>
    </div>

    <script>
        function apiFetch(url, options = {}) {
    const userId = localStorage.getItem("userId");

    return fetch(url, {
        ...options,
        headers: {
            "Content-Type": "application/json",
            "x-user-id": userId
        }
    });
}
        let fichasCache = [];

        window.onload = function() {
            if (localStorage.getItem('logado') !== 'true') {
                window.location.href = "login.html";
                return;
            }
            aplicarPreferencias();
            carregarFichas();
        };

        function aplicarPreferencias() {
            const tema = localStorage.getItem('tema') || 'light';
            const cor = localStorage.getItem('corPrincipal') || '#1a73e8';
            if (tema === 'dark') document.body.classList.add('dark-mode');
            document.getElementById('navPrincipal').style.backgroundColor = cor;
            document.documentElement.style.setProperty('--cor-principal', cor);
        }

        function fecharModal() { 
            document.getElementById('modalOverlay').style.display = 'none'; 
            carregarFichas(); 
        }
        
        function avisar(titulo, texto) {
            document.getElementById('modalTitle').innerText = titulo;
            document.getElementById('modalText').innerText = texto;
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function filtrarPorNome() {
            const busca = document.getElementById('campoBusca').value.toLowerCase();
            const cards = document.getElementsByClassName('cliente-card');
            for (let card of cards) {
                const nomeCliente = card.getAttribute('data-nome').toLowerCase();
                card.style.display = nomeCliente.includes(busca) ? "block" : "none";
            }
        }

        async function carregarFichas() {
            const listaContainer = document.getElementById('listaFiados');

            try {
                const resposta = await apiFetch("/fiados");
                fichasCache = await resposta.json();

                if (!Array.isArray(fichasCache) || fichasCache.length === 0) {
                    listaContainer.innerHTML = '<div style="text-align:center; padding:50px; opacity:0.5;">Não há contas pendentes registradas.</div>';
                    return;
                }

                const porCliente = {};
                fichasCache.forEach(v => {
                    if (!porCliente[v.cliente]) porCliente[v.cliente] = { saldo: 0, historico: [] };
                    if (v.metodo === "Fiado") porCliente[v.cliente].saldo += Number(v.valor || 0);
                    else porCliente[v.cliente].saldo -= Number(v.valor || 0);
                    porCliente[v.cliente].historico.push(v);
                });

                listaContainer.innerHTML = "";
                let clientesExibidos = 0;

                for (let nome in porCliente) {
                    const ficha = porCliente[nome];
                    if (ficha.saldo <= 0.001) continue;
                    clientesExibidos++;

                    const nomeSeguro = nome.replace(/'/g, "\\'");

                    listaContainer.innerHTML += `
                        <div class="cliente-card" data-nome="${nome}">
                            <div class="cliente-header">
                                <span class="cliente-nome">👤 ${nome}</span>
                                <span class="total-divida">R$ ${ficha.saldo.toFixed(2)}</span>
                            </div>
                            <div class="painel-pagamento">
                                <div class="campo-input">
                                    <label>Valor que o cliente pagou:</label>
                                    <input type="number" step="0.01" id="recebido_${nomeSeguro}" placeholder="0,00" oninput="calcularTrocoInterface('${nomeSeguro}', ${ficha.saldo})">
                                </div>
                                <div class="resultado-troco" id="troco_box_${nomeSeguro}">TROCO: R$ <span id="troco_valor_${nomeSeguro}">0.00</span></div>
                                <button class="btn-confirmar" onclick="processarPagamento('${nomeSeguro}', ${ficha.saldo})">CONFIRMAR PAGAMENTO</button>
                            </div>
                            <table>
                                <thead><tr><th>Data</th><th>Tipo</th><th>Valor</th></tr></thead>
                                <tbody>
                                    ${ficha.historico.slice().reverse().slice(0, 5).map(h => `
                                        <tr>
                                            <td>${String(h.data || "").split(',')[0]}</td>
                                            <td class="${h.metodo === 'Pagamento Parcial' ? 'pagamento-registro' : ''}">
                                                ${h.metodo === 'Pagamento Parcial' ? '✅ Pagamento' : '🛒 Compra'}
                                            </td>
                                            <td>R$ ${Number(h.valor || 0).toFixed(2)}</td>
                                        </tr>`).join('')}
                                </tbody>
                            </table>
                        </div>`;
                }

                if (clientesExibidos === 0) {
                    listaContainer.innerHTML = '<div style="text-align:center; padding:50px; opacity:0.5;">Todas as contas estão em dia!</div>';
                }
            } catch (err) {
                console.error(err);
                listaContainer.innerHTML = '<div style="text-align:center; padding:50px; opacity:0.5;">Erro ao carregar fichas.</div>';
            }
        }

        function calcularTrocoInterface(nome, saldo) {
            const input = document.getElementById(`recebido_${nome}`);
            const box = document.getElementById(`troco_box_${nome}`);
            const span = document.getElementById(`troco_valor_${nome}`);
            const valor = parseFloat(input.value) || 0;

            if (valor > saldo) { 
                span.innerText = (valor - saldo).toFixed(2); 
                box.style.display = "block"; 
            } else { 
                box.style.display = "none"; 
            }
        }

        async function processarPagamento(nome, saldo) {
            const input = document.getElementById(`recebido_${nome}`);
            const valorEntregue = parseFloat(input.value);
            
            if (isNaN(valorEntregue) || valorEntregue <= 0) {
                alert("Por favor, insira um valor válido para o pagamento.");
                return;
            }

            const valorAbatido = valorEntregue > saldo ? saldo : valorEntregue;

            try {
                const resposta = await apiFetch("/fiados/pagamento", {
                    method: "POST",
                    body: JSON.stringify({
                        cliente: nome,
                        valor: valorAbatido
                    })
                });

                if (!resposta.ok) {
                    throw new Error("Falha ao registrar pagamento.");
                }

                avisar("Pagamento Registrado", `Foi dado baixa em R$ ${valorAbatido.toFixed(2)} na conta de ${nome}.`);
            } catch (err) {
                console.error(err);
                alert("Erro ao registrar pagamento.");
            }
        }
    </script>
</body>
</html>
