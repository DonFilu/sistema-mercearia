<!DOCTYPE html>
<html lang="pt-br">
    
<head>
    <link rel="icon" href="/favicon.ico">
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta charset="UTF-8">
    <title>Acesso ao Sistema</title>

  <style>
:root {
    --cor-principal: #1a73e8;
    --bg-card: white;
    --text-color: #333;
}

/* FUNDO */
body { 
    font-family: 'Segoe UI', sans-serif; 
    background: radial-gradient(circle at top, #4facfe, #1a73e8);
    display: flex; 
    justify-content: center; 
    align-items: center; 
    height: 100vh; 
    margin: 0; 
}

/* CARD */
.box { 
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    padding: 35px; 
    border-radius: 22px; 
    box-shadow: 0 25px 60px rgba(0,0,0,0.25); 
    text-align: center; 
    width: 320px;
    animation: fadeIn 0.6s ease;
}

/* ANIMAÇÃO */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
}

/* LOGO */
.logo-container {
    margin-bottom: 20px;
}

.logo {
    width: 120px;
    margin-bottom: 10px;
    filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
}

/* TEXTO */
.titulo-logo {
    font-size: 13px;
    color: #666;
}

#inicio h2 {
    font-size: 26px;
    margin: 15px 0 5px;
}

.subtexto {
    font-size: 13px;
    color: #888;
    margin-bottom: 20px;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: 2px solid #eee;
    transition: 0.2s;
}

input:focus {
    border-color: var(--cor-principal);
    box-shadow: 0 0 0 3px rgba(26,115,232,0.2);
    outline: none;
}

/* BOTÃO */
button {
    width: 100%;
    padding: 13px;
    margin-top: 12px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #28a745, #34d058);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.25s;
}

button:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

button:active {
    transform: scale(0.97);
}
</style>

<div class="box">

    <!-- LOGO -->
    <div class="logo-container">
        <img src="logo.png" class="logo">
        <div class="titulo-logo">Sistema Mercearia</div>
    </div>

    <!-- INICIAL -->
    <div id="inicio">
        <h2>Bem-vindo!</h2>
        <div class="subtexto">Controle total da sua mercearia em um só lugar</div>

        <button onclick="mostrarLogin()">LOGIN</button>
        <button onclick="mostrarCadastro()">CRIAR CONTA</button>
    </div>

    <!-- LOGIN -->
    <div id="login" style="display:none;">
        <h2>Login</h2>

        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginSenha" placeholder="Senha">

        <button onclick="entrar()">ENTRAR</button>

        <p style="margin-top:10px;">
            <a href="https://wa.me/554899962908?text=Oi,%20esqueci%20minha%20senha" target="_blank">
                Esqueceu sua senha?
            </a>
        </p>

        <button onclick="voltar()">Voltar</button>
    </div>

    <!-- CADASTRO -->
    <div id="cadastro" style="display:none;">
        <h2>Criar Conta</h2>

        <input type="email" id="cadEmail" placeholder="Email">
        <input type="password" id="cadSenha" placeholder="Senha">
        <input type="password" id="cadConfirmar" placeholder="Confirmar Senha">

        <button onclick="criarConta()">CRIAR CONTA</button>
        <button onclick="voltar()">Voltar</button>
    </div>

</div>

<script>

// TEMA
window.onload = function() {
    const tema = localStorage.getItem('tema');
    const cor = localStorage.getItem('corPrincipal') || '#1a73e8';
    
    // BLOQUEIO SE JÁ ESTIVER LOGADO
    if (localStorage.getItem("logado") === "true") {
        window.location.href = "index.html";
    }

    if (tema === 'dark') {
        document.body.classList.add('dark-mode');
    } else {
        document.body.style.backgroundColor = cor;
    }
};

// TELAS
function mostrarLogin() {
    inicio.style.display = "none";
    login.style.display = "block";
}

function mostrarCadastro() {
    inicio.style.display = "none";
    cadastro.style.display = "block";
}

function voltar() {
    inicio.style.display = "block";
    login.style.display = "none";
    cadastro.style.display = "none";
}

// LOGIN
async function entrar() {
    const email = document.getElementById("loginEmail").value;
    const senha = document.getElementById("loginSenha").value;

    const res = await fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email, senha })
    });

    if (!res.ok) {
        alert("Email ou senha incorretos");
        return;
    }

    const data = await res.json();

    localStorage.setItem("userId", data.userId);
    localStorage.setItem("logado", "true");

    window.location.href = "index.html";
}

// CADASTRO
async function criarConta() {
    const email = cadEmail.value;
    const senha = cadSenha.value;
    const confirmar = cadConfirmar.value;

    if (!email || !senha || !confirmar) {
        alert("Preencha tudo");
        return;
    }

    if (senha !== confirmar) {
        alert("Senhas não coincidem");
        return;
    }

    const res = await fetch("/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email, senha })
    });

    const data = await res.json();

    if (!res.ok) {
        alert(data.erro);
        return;
    }

    alert("Conta criada com sucesso!");
    voltar();
}

</script>

</body>
</html>
